name: Build DEB Package (Cross-Compile)

on:
  push:
    branches: [ main, feature/cross-compile-github-actions ]
  pull_request:
    branches: [ main, feature/cross-compile-github-actions ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: amd64
            arch: amd64
            platform: linux/amd64
            base_image: ubuntu:22.04
          - name: arm64
            arch: arm64
            platform: linux/arm64
            base_image: arm64v8/ubuntu:22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build DEB package
      run: |
        echo "Building Netpulse DEB package for ${{ matrix.name }} (arch: ${{ matrix.arch }})..."
        
        # Create Dockerfile for cross-compilation
        cat > Dockerfile.build << 'EOF'
        FROM ${{ matrix.base_image }}
        
        # Prevent interactive prompts during package installation
        ENV DEBIAN_FRONTEND=noninteractive
        
        # Install build dependencies
        RUN apt-get update
        RUN apt-get install -y build-essential debhelper dh-python python3 python3-setuptools python3-pip python3-dev
        
        # Verify Python installation
        RUN python3 --version || echo "Python3 version check failed"
        RUN which python3 || echo "Python3 path check failed"
        RUN python3 -c "import sys; print(f'Python {sys.version_info.major}.{sys.version_info.minor} found')" || echo "Python3 import test failed"
        
        WORKDIR /app
        COPY . .
        
        # Verify all necessary files are present
        RUN echo "=== Checking project structure ===" && \
            ls -la && \
            echo "=== Checking setup.py ===" && \
            test -f setup.py && echo "setup.py found" || exit 1 && \
            echo "=== Checking debian directory ===" && \
            test -d debian && echo "debian directory found" || exit 1 && \
            echo "=== Checking debian/rules ===" && \
            test -f debian/rules && echo "debian/rules found" || exit 1 && \
            echo "=== Checking debian/control ===" && \
            test -f debian/control && echo "debian/control found" || exit 1 && \
            echo "=== Checking build.sh ===" && \
            test -f build.sh && echo "build.sh found" || exit 1
        
        # Set permissions for debian scripts
        RUN chmod +x debian/postinst debian/prerm debian/rules build.sh
        
        # Build the package
        RUN echo "=== DEBUG START ===" && \
            echo "=== Current directory: $(pwd)" && \
            echo "=== Files in current directory:" && \
            ls -la && \
            echo "=== Checking for setup.py:" && \
            find . -name "setup.py" && \
            echo "=== DEBUG END ===" && \
            chmod +x build.sh && \
            echo "=== Running build.sh ===" && \
            ./build.sh 2>&1 || (echo "Build failed, checking for errors..." && ls -la && cat build.sh | head -20 && exit 1)
        
        # Verify the package was built
        RUN echo "=== Checking build results ===" && \
            find . -name "*.deb" -type f -exec echo "Found package: {}" \; && \
            ls -la *.deb && \
            dpkg -I *.deb && \
            echo "=== Package contents ===" && \
            dpkg -c *.deb | grep -E "(netpulse|\.dist-info|\.egg-info|entry_points)" && \
            echo "=== Python package check ===" && \
            dpkg -c *.deb | grep -E "usr/lib/python.*/dist-packages.*netpulse" && \
            echo "=== Metadata check ===" && \
            dpkg -c *.deb | grep -E "(\.dist-info|\.egg-info)" && \
            echo "=== Package verification complete ==="
        EOF
        
        # Build using Docker Buildx for cross-platform support
        echo "=== Starting Docker build ==="
        docker buildx build \
          --platform ${{ matrix.platform }} \
          --output type=local,dest=. \
          -f Dockerfile.build .
        
        # Find and move the built package to current directory
        echo "=== Extracting packages from Docker build ==="
        find . -name "*.deb" -type f -exec cp {} . \;
        ls -la *.deb || echo "No .deb files found in current directory"
        
        # Debug: Show Docker build output
        echo "=== Docker build debug info ==="
        find . -name "*.log" -o -name "*.buildinfo" -exec cat {} \; || echo "No build logs found"
        echo "=== Current working directory contents ==="
        ls -la || echo "Could not list directory"
        
        # Verify package architecture and contents
        echo "=== Package verification ==="
        for pkg in *.deb; do
          if [ -f "$pkg" ]; then
            echo "Package information for $pkg:"
            dpkg -I "$pkg" || echo "Could not read package info"
            echo "Package architecture check:"
            dpkg --info "$pkg" | grep Architecture || echo "Could not determine architecture"
            echo "Package contents check:"
            dpkg -c "$pkg" | head -10 || echo "Could not list package contents"
          else
            echo "ERROR: No package files found!"
            find . -name "*.deb" -o -name "*.changes" -o -name "*.buildinfo"
            exit 1
          fi
        done

    - name: Upload DEB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: netpulse-deb-${{ matrix.name }}
        path: "*.deb"
        retention-days: 30
        if-no-files-found: warn

  test-install:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: amd64
          - name: arm64
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: netpulse-deb-${{ matrix.name }}
        path: packages/

    - name: Test package installation
      run: |
        echo "Testing ${{ matrix.name }} package installation..."
        ls -la packages/
        
        if [ "${{ matrix.name }}" = "amd64" ]; then
          # Test AMD64 package
          sudo apt-get update
          sudo dpkg -i packages/*.deb || true
          sudo apt-get install -f -y
          echo "AMD64 package installed successfully"
          
          # Verify installation
          which netpulse && echo "netpulse command found"
          which netpulse-measure && echo "netpulse-measure command found"
          systemctl status netpulse-web.service || echo "Service check skipped"
        else
          # For ARM64, we can only test the package structure
          echo "Testing ARM64 package structure..."
          dpkg -c packages/*.deb && echo "ARM64 package structure is valid"
          dpkg -I packages/*.deb | grep Architecture && echo "Architecture check passed"
        fi

  release:
    needs: [build, test-install]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
        pattern: netpulse-deb-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
