name: Docker Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU for cross-compilation
      if: matrix.architecture == 'arm64'
      uses: docker/setup-qemu-action@v2
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: netpulse
        tags: |
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ matrix.architecture }}

    - name: Build Docker image (local only)
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/${{ matrix.architecture }}
        push: false  # No pushing to registry
        load: true   # Load to local Docker daemon
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        echo "Testing Docker image for ${{ matrix.architecture }}..."
        docker run --rm --platform=linux/${{ matrix.architecture }} netpulse:${{ matrix.architecture }} python -c "import netpulse; print('Netpulse imported successfully')"
