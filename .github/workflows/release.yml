name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: amd64
            arch: amd64
            platform: linux/amd64
            base_image: ubuntu:22.04
          - name: arm64
            arch: arm64
            platform: linux/arm64
            base_image: arm64v8/ubuntu:22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract version from tag
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Build DEB package
      run: |
        echo "Building Netpulse DEB package for ${{ matrix.name }} (arch: ${{ matrix.arch }}) - version $VERSION"
        
        # Create Dockerfile for cross-compilation
        cat > Dockerfile.build << 'EOF'
        FROM ${{ matrix.base_image }}
        
        # Prevent interactive prompts during package installation
        ENV DEBIAN_FRONTEND=noninteractive
        
        # Install build dependencies
        RUN apt-get update
        RUN apt-get install -y build-essential debhelper dh-python python3 python3-setuptools python3-pip python3-dev unzip
        
        WORKDIR /app
        COPY . .
        
        # Make build script executable and run build
        RUN chmod +x build.sh
        RUN ./build.sh
        
        # Verify package was created
        RUN echo "=== Build results ===" && \
            find . -name "*.deb" -type f -exec ls -la {} \; || \
            (echo "ERROR: No package files found!" && exit 1)
        EOF
        
        # Build using Docker Buildx for cross-platform support
        echo "=== Starting Docker build ==="
        docker buildx build \
          --platform ${{ matrix.platform }} \
          --output type=local,dest=. \
          -f Dockerfile.build .
        
        # Find and move the built package to current directory
        echo "=== Extracting packages from Docker build ==="
        find . -name "*.deb" -type f -exec cp {} . \;
        ls -la *.deb || echo "No .deb files found in current directory"

    - name: Rename package with version
      run: |
        for deb in *.deb; do
          if [[ "$deb" == netpulse_*.deb ]]; then
            new_name="netpulse_${{ env.VERSION }}_${{ matrix.arch }}.deb"
            mv "$deb" "$new_name"
            echo "Renamed $deb to $new_name"
          fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: netpulse-deb-${{ matrix.name }}
        path: "*.deb"
        retention-days: 30
        if-no-files-found: warn

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/netpulse-deb-amd64/*.deb
          artifacts/netpulse-deb-arm64/*.deb
        draft: false
        prerelease: false
        name: Release ${{ github.ref_name }}
        body: |
          ## 🛡️ Release ${{ github.ref_name }} - Security-First Network Monitoring Tool
          
          🚀 **Production-Ready with OWASP Security Implementation**
          
          ### 📦 Downloads
          - **AMD64**: `netpulse_${{ github.ref_name }}_amd64.deb` - For desktops and servers
          - **ARM64**: `netpulse_${{ github.ref_name }}_arm64.deb` - For Raspberry Pi and ARM servers
          
          ### ✨ Security Features (OWASP Top 10 2021)
          🔒 **Security Headers**: CSP, HSTS, X-Frame-Options, X-Content-Type-Options
          🛡️ **Rate Limiting**: API endpoints with different limits (Test: 10/min, Config: 20/hour)
          🔍 **Input Validation**: Strict validation against injection attacks
          📝 **Security Logging**: IP tracking and event monitoring
          🔐 **Secret Management**: Automatic secure secret key generation
          🔒 **File Permissions**: Secure permissions (Database: 600, Config: 640)
          🛡️ **Security Audit Tool**: Automated vulnerability scanning
          
          ### 🎨 UI/UX Improvements
          📱 **Mobile Layout Fixes**: Responsive design and footer improvements
          🎨 **Footer Design**: Glassmorphism effect with gradient background
          📊 **Statistics Enhancement**: Icons and abbreviations for mobile readability
          🔄 **Rolling Time Periods**: 7/30/365 days instead of calendar periods
          🎨 **Theme Persistence**: Theme selection survives page reloads
          
          ### 🔧 Technical Improvements
          🔧 **Timer Helper Script Fix**: Correct systemd calendar format for multi-hour intervals
          📦 **Dependencies**: Flask-Talisman, Flask-Limiter, psutil, pip-audit
          📋 **Documentation**: Complete security documentation and installation guide
          🔒 **CSP Fixes**: Resolved Content Security Policy for Chart.js functionality
          
          ### 🐛 Bug Fixes
          🐛 **Chart Display**: Fixed CSP blocking inline JavaScript and CDN connections
          🐛 **Canvas Rendering**: Fixed canvas height and responsive display
          🐛 **Data Loading**: Restored API data loading with proper error handling
          
          ### 🧹 Code Cleanup
          - Removed duplicate templates/ and static/ directories
          - Removed debug scripts and development artifacts
          - Clean, production-ready codebase (29 files total)
          
          ### 🔧 Installation
          ```bash
          # Download the appropriate package for your architecture
          # Install with:
          sudo dpkg -i netpulse_${{ github.ref_name }}_arm64.deb  # For Raspberry Pi
          sudo dpkg -i netpulse_${{ github.ref_name }}_amd64.deb  # For desktops/servers
          sudo apt-get install -f  # Install dependencies if needed
          
          # Security hardening is automatic during installation
          # Run security audit with: python3 /usr/lib/python3/dist-packages/netpulse/security/security_check.py
          ```
          
          ### 📋 Files Added
          - `SECURITY_INSTALLATION.md`: Complete security installation guide
          - `security/security_config.py`: Security configuration utilities
          - `security/security_check.py`: Automated security auditor
          - `debian/netpulse.postinst`: Post-installation security hardening
          
          ### 📊 Dependencies
          - python3, python3-flask (>= 2.2.2), python3-click (>= 8.1.3)
          - python3-jinja2 (>= 3.1.0), python3-werkzeug (>= 2.2.2)
          - python3-pip-audit (for security scanning)
          
          ---
          
          🛡️ **Enterprise-Grade Security** | 📱 **Mobile-First Design** | 🚀 **Production-Ready**
          
          🤖 **This release was created automatically by GitHub Actions**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
