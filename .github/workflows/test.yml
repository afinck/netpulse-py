name: Tests

on:
  push:
    branches: [ main, feature/github-actions-deb-build ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock black isort flake8 bandit safety

    - name: Lint with flake8
      run: |
        echo "Running flake8 checks..."
        flake8 --version
        echo "Checking critical errors (E9,F63,F7,F82):"
        flake8 netpulse/ --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "Checking full code quality:"
        flake8 netpulse/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics --ignore=C901,W503

    - name: Security check with bandit
      run: |
        echo "Running bandit security checks..."
        bandit -r netpulse/

    - name: Check dependencies with safety
      run: |
        echo "Running safety dependency checks..."
        safety check

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y iputils-ping curl
        # Install librespeed-cli from GitHub releases (correct filename)
        wget https://github.com/librespeed/speedtest-cli/releases/download/v1.0.12/librespeed-cli_1.0.12_linux_amd64.tar.gz
        tar -xzf librespeed-cli_1.0.12_linux_amd64.tar.gz
        sudo cp librespeed-cli /usr/local/bin/
        sudo chmod +x /usr/local/bin/librespeed-cli
        librespeed-cli --version

    - name: Test with pytest (unit tests only)
      run: |
        NETPULSE_TEST_MODE=true pytest tests/test_config.py tests/test_database.py tests/test_speedtest.py tests/test_web.py::TestWebInterface::test_api_health_endpoint tests/test_web.py::TestWebInterface::test_api_data_endpoint tests/test_web.py::TestWebInterface::test_api_stats_endpoint -v --cov=netpulse --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
