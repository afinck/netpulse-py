name: Test

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', 3.11, 3.12, 3.13]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock

    - name: Run unit tests
      run: |
        pytest tests/test_config.py tests/test_database.py tests/test_speedtest.py -v --cov=netpulse --cov-report=xml --cov-report=term-missing

    - name: Run web API tests
      run: |
        pytest tests/test_web.py::TestWebInterface::test_api_health_endpoint tests/test_web.py::TestWebInterface::test_api_data_endpoint tests/test_web.py::TestWebInterface::test_api_stats_endpoint -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
