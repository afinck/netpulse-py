name: Tests

on:
  push:
    branches: [ main, feature/github-actions-deb-build ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock black isort flake8 bandit safety

    - name: Lint with flake8
      run: |
        flake8 netpulse/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 netpulse/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics --ignore=C901,W503

    - name: Security check with bandit
      run: bandit -r netpulse/

    - name: Check dependencies with safety
      run: safety check

    - name: Test with pytest
      run: |
        NETPULSE_TEST_MODE=true pytest tests/ -v --cov=netpulse --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
