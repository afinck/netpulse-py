name: Build DEB Package

on:
  push:
    branches: [ main, feature/github-actions-deb-build ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture: [amd64, arm64]
        include:
          - architecture: amd64
            os: ubuntu
            base_image: ubuntu:22.04
          - architecture: arm64
            os: linux
            base_image: ubuntu:22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build DEB package locally
      run: |
        echo "Building Netpulse DEB package for ${{ matrix.architecture }}..."
        chmod +x build.sh
        
        # Set architecture for ARM64 build
        if [ "${{ matrix.architecture }}" = "arm64" ]; then
          echo "Setting architecture for ARM64 build..."
          export DEB_BUILD_OPTIONS="--host-arch arm64"
          export CC="aarch64-linux-gnu-gcc"
          export CXX="aarch64-linux-gnu-g++"
          # Install cross-compilation tools for ARM64
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu || true
        else
          echo "Building for AMD64..."
          export DEB_BUILD_OPTIONS=""
          export CC="gcc"
          export CXX="g++"
        fi
        
        # Install build dependencies
        sudo apt-get update || true
        sudo apt-get install -y build-essential debhelper dh-python python3 python3-setuptools || true
        ./build.sh
        
        echo "Build completed. Current directory contents:"
        ls -la *.deb || echo "No .deb files found"
        echo "Package information:"
        dpkg -I *.deb || echo "No package info available"

    - name: Upload DEB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: netpulse-deb-${{ matrix.architecture }}
        path: "*.deb"
        retention-days: 30
        if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
        pattern: netpulse-deb-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
