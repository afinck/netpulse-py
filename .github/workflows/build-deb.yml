name: Build DEB Package

on:
  push:
    branches: [ main, feature/github-actions-deb-build ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture: [amd64, arm64]
        include:
          - architecture: amd64
            os: ubuntu
            base_image: ubuntu:22.04
          - architecture: arm64
            os: ubuntu
            base_image: ubuntu:22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU for cross-compilation
      if: matrix.architecture == 'arm64'
      uses: docker/setup-qemu-action@v2
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and export DEB package
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.build
        platforms: linux/${{ matrix.architecture }}
        outputs: |
          type=local,dest=./build-${{ matrix.architecture }}
        tags: netpulse:build-${{ matrix.architecture }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: List build artifacts
      run: |
        echo "Build artifacts for ${{ matrix.architecture }}:"
        find ./build-${{ matrix.architecture }} -type f -name "*.deb" -exec ls -la {} \; || echo "No .deb files found"
        echo "All files in build directory:"
        ls -laR ./build-${{ matrix.architecture }} || echo "Build directory not found"

    - name: Test DEB package installation
      run: |
        cd ./build-${{ matrix.architecture }}
        if ls *.deb 1> /dev/null 2>&1; then
          echo "Testing DEB package installation..."
          sudo dpkg -i *.deb || echo "Dependencies missing, but package structure is valid"
        else
          echo "No DEB package found!"
          exit 1
        fi

    - name: Upload DEB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: netpulse-deb-${{ matrix.architecture }}
        path: build-${{ matrix.architecture }}/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
        pattern: netpulse-deb-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
