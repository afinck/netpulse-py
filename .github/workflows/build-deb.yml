name: Build DEB Package

on:
  push:
    branches: [ main, feature/github-actions-deb-build ]
  pull_request:
    branches: [ main, feature/github-actions-deb-build ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture: [amd64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build DEB package locally
      run: |
        echo "Building Netpulse DEB package for ${{ matrix.architecture }}..."
        chmod +x build.sh
        
        # Build for AMD64
        echo "Building for AMD64..."
        
        # Install build dependencies
        sudo apt-get update || true
        sudo apt-get install -y build-essential debhelper dh-python python3 python3-setuptools || true
        ./build.sh
        
        echo "Build completed. Current directory contents:"
        ls -la *.deb || echo "No .deb files found"
        echo "Package information:"
        dpkg -I *.deb || echo "No package info available"

    - name: Upload DEB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: netpulse-deb-amd64
        path: "*.deb"
        retention-days: 30
        if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
        pattern: netpulse-deb-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
