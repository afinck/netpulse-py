name: Build DEB Package

on:
  push:
    branches: [ main, feature/* ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper dh-python python3 python3-setuptools python3-pip python3-dev unzip

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build DEB package
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Find and list packages
      run: |
        echo "=== Looking for DEB packages ==="
        find . -name "*.deb" -type f -exec ls -la {} \;
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: netpulse-deb-package
        path: "*.deb"
        retention-days: 30
        if-no-files-found: warn
