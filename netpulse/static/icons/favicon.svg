<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0d6efd" rx="6"/>
  
  <!-- Speedometer circle -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Speed marks -->
  <line x1="16" y1="4" x2="16" y2="7" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="28" y1="16" x2="25" y2="16" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="16" y1="28" x2="16" y2="25" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="4" y1="16" x2="7" y2="16" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- Needle -->
  <line x1="16" y1="16" x2="24" y2="8" stroke="#ffc107" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="16" r="2" fill="#ffffff"/>
  
  <!-- Network nodes -->
  <circle cx="10" cy="10" r="1.5" fill="#28a745"/>
  <circle cx="22" cy="10" r="1.5" fill="#28a745"/>
  <circle cx="16" cy="6" r="1.5" fill="#28a745"/>
  
  <!-- Network connections -->
  <line x1="10" y1="10" x2="16" y2="6" stroke="#28a745" stroke-width="1" opacity="0.7"/>
  <line x1="22" y1="10" x2="16" y2="6" stroke="#28a745" stroke-width="1" opacity="0.7"/>
</svg>
