# Netpulse Default Configuration
# This file will be copied to /etc/netpulse/netpulse.conf during installation

# Database settings
database.path=/var/lib/netpulse/netpulse.db
database.backup_enabled=true
database.backup_interval_days=7

# Measurement settings
measurement.interval_minutes=15
measurement.timeout_seconds=120
measurement.retry_count=3
measurement.servers=

# Web interface settings
web.host=0.0.0.0
web.port=8080
web.debug=false
web.secret_key=change-me-in-production

# Logging settings
logging.level=INFO
logging.file=/var/log/netpulse/netpulse.log
logging.max_size_mb=10
logging.backup_count=5
